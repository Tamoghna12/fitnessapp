<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Protocol — Fitness Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0a0a0f;
  --bg-card: #12121a;
  --bg-card-hover: #1a1a26;
  --bg-input: #1e1e2e;
  --bg-elevated: #161622;
  --accent: #ff3c5f;
  --accent-glow: rgba(255, 60, 95, 0.3);
  --accent-secondary: #00e5a0;
  --accent-secondary-glow: rgba(0, 229, 160, 0.2);
  --accent-purple: #a855f7;
  --accent-blue: #3b82f6;
  --accent-amber: #f59e0b;
  --text-primary: #e8e8f0;
  --text-secondary: #8888a0;
  --text-muted: #55556a;
  --border: #2a2a3a;
  --border-subtle: #1f1f2f;
  --success: #22c55e;
  --warning: #f59e0b;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Background texture ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,60,95,0.06), transparent),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(0,229,160,0.04), transparent);
  pointer-events: none;
  z-index: 0;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Layout ── */
.app { position: relative; z-index: 1; }

.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 10, 15, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-subtle);
  padding: 0 2rem;
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent), #ff6b8a);
  border-radius: var(--radius-sm);
  display: grid;
  place-items: center;
  font-size: 18px;
  box-shadow: 0 0 20px var(--accent-glow);
}

.logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 3px;
  background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ── Navigation ── */
.nav { display: flex; gap: 4px; }

.nav-btn {
  padding: 8px 16px;
  background: transparent;
  color: var(--text-secondary);
  border: none;
  border-radius: var(--radius-xs);
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  position: relative;
}

.nav-btn:hover { color: var(--text-primary); background: var(--bg-elevated); }

.nav-btn.active {
  color: var(--accent);
  background: rgba(255, 60, 95, 0.1);
}

.nav-btn.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 20%;
  right: 20%;
  height: 2px;
  background: var(--accent);
  border-radius: 1px;
}

/* ── Main content ── */
.main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem;
}

.page { display: none; animation: fadeIn 0.3s ease; }
.page.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Page titles ── */
.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem;
  letter-spacing: 2px;
  margin-bottom: 0.25rem;
}

.page-subtitle {
  color: var(--text-secondary);
  font-size: 0.95rem;
  font-weight: 300;
  margin-bottom: 2rem;
}

/* ── Cards ── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  transition: var(--transition);
}

.card:hover { border-color: var(--border); }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 1.5px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.badge-strength { background: rgba(255,60,95,0.15); color: var(--accent); }
.badge-hypertrophy { background: rgba(168,85,247,0.15); color: var(--accent-purple); }
.badge-rest { background: rgba(0,229,160,0.1); color: var(--accent-secondary); }

/* ── Schedule grid ── */
.schedule-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 2rem;
}

.schedule-day {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 1rem;
  text-align: center;
  transition: var(--transition);
  cursor: pointer;
}

.schedule-day:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.schedule-day.rest { opacity: 0.5; cursor: default; }
.schedule-day.rest:hover { transform: none; border-color: var(--border-subtle); box-shadow: none; }

.day-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.day-focus {
  font-weight: 600;
  font-size: 0.95rem;
  margin-bottom: 4px;
}

.day-meta {
  font-size: 0.75rem;
  color: var(--text-secondary);
}

/* ── Workout page ── */
.workout-section {
  margin-bottom: 1.5rem;
}

.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-subtle);
}

/* ── Warmup / Cooldown list ── */
.routine-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 8px;
}

.routine-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg-elevated);
  border-radius: var(--radius-xs);
  font-size: 0.9rem;
  color: var(--text-secondary);
  transition: var(--transition);
}

.routine-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }

.routine-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
  width: 20px;
  text-align: center;
}

/* ── Exercise table ── */
.exercise-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin-top: 0.5rem;
}

.exercise-table thead th {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 64px;
  background: var(--bg-card);
  z-index: 5;
}

.exercise-table thead th.center { text-align: center; }

.exercise-table tbody tr {
  transition: var(--transition);
}

.exercise-table tbody tr:hover {
  background: var(--bg-elevated);
}

.exercise-table td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 0.9rem;
  vertical-align: middle;
}

.exercise-table td.center { text-align: center; }

.exercise-name {
  font-weight: 600;
  color: var(--text-primary);
}

.exercise-target {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

.exercise-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.load-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--bg-input);
  color: var(--text-secondary);
  white-space: nowrap;
}

/* ── Log inputs ── */
.log-input-group {
  display: flex;
  gap: 6px;
  align-items: center;
}

.log-input {
  width: 60px;
  padding: 6px 8px;
  background: var(--bg-input);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xs);
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  text-align: center;
  transition: var(--transition);
}

.log-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.log-input::placeholder {
  color: var(--text-muted);
  font-size: 0.7rem;
}

.log-label {
  font-size: 0.65rem;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}

/* ── Week selector ── */
.week-selector {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.5rem;
  padding: 1rem 1.25rem;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
}

.week-selector label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
}

.week-pills {
  display: flex;
  gap: 6px;
}

.week-pill {
  padding: 6px 14px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
}

.week-pill:hover { border-color: var(--accent); color: var(--text-primary); }

.week-pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  box-shadow: 0 0 16px var(--accent-glow);
}

/* ── Progress page ── */
.progress-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5rem;
  margin-bottom: 2rem;
}

.metric-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 1.25rem;
}

.metric-card-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-bottom: 1rem;
}

.metric-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-subtle);
}

.metric-row:last-child { border-bottom: none; }

.metric-name {
  font-size: 0.9rem;
  font-weight: 500;
}

.metric-input {
  width: 80px;
  padding: 6px 10px;
  background: var(--bg-input);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xs);
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  text-align: center;
  transition: var(--transition);
}

.metric-input:focus {
  outline: none;
  border-color: var(--accent-secondary);
  box-shadow: 0 0 0 3px var(--accent-secondary-glow);
}

.metric-change {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  padding: 2px 8px;
  border-radius: 4px;
  margin-left: 8px;
}

.change-up { background: rgba(34,197,94,0.1); color: var(--success); }
.change-down { background: rgba(255,60,95,0.1); color: var(--accent); }
.change-neutral { background: var(--bg-input); color: var(--text-muted); }

/* ── Wellness sliders ── */
.wellness-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-subtle);
}

.wellness-row:last-child { border-bottom: none; }

.wellness-label {
  flex: 0 0 140px;
  font-size: 0.9rem;
  font-weight: 500;
}

.wellness-slider {
  flex: 1;
  -webkit-appearance: none;
  height: 6px;
  background: var(--bg-input);
  border-radius: 3px;
  outline: none;
}

.wellness-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 10px var(--accent-glow);
}

.wellness-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.1rem;
  font-weight: 600;
  width: 30px;
  text-align: center;
}

/* ── Exercise Library ── */
.library-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 12px;
}

.library-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  transition: var(--transition);
}

.library-item:hover {
  border-color: var(--border);
  background: var(--bg-card-hover);
}

.library-equip-icon {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-xs);
  display: grid;
  place-items: center;
  font-size: 16px;
  flex-shrink: 0;
}

.equip-db { background: rgba(255,60,95,0.12); }
.equip-kb { background: rgba(168,85,247,0.12); }
.equip-bw { background: rgba(0,229,160,0.12); }

.library-info { flex: 1; min-width: 0; }

.library-name {
  font-weight: 600;
  font-size: 0.9rem;
  margin-bottom: 2px;
}

.library-muscles {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.library-sub {
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* ── Buttons ── */
.btn {
  padding: 8px 20px;
  border: none;
  border-radius: var(--radius-xs);
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}

.btn-accent {
  background: var(--accent);
  color: white;
  box-shadow: 0 0 16px var(--accent-glow);
}

.btn-accent:hover { background: #ff5577; transform: translateY(-1px); }

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.btn-ghost:hover { border-color: var(--text-muted); color: var(--text-primary); }

.btn-success {
  background: var(--accent-secondary);
  color: var(--bg-primary);
}

.btn-success:hover { opacity: 0.9; }

/* ── Save indicator ── */
.save-toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  padding: 10px 20px;
  background: var(--accent-secondary);
  color: var(--bg-primary);
  font-weight: 600;
  font-size: 0.85rem;
  border-radius: var(--radius-sm);
  opacity: 0;
  transform: translateY(10px);
  transition: 0.3s ease;
  z-index: 200;
  pointer-events: none;
}

.save-toast.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ── Notes textarea ── */
.notes-area {
  width: 100%;
  min-height: 80px;
  padding: 12px;
  background: var(--bg-input);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  resize: vertical;
  transition: var(--transition);
}

.notes-area:focus {
  outline: none;
  border-color: var(--accent-secondary);
  box-shadow: 0 0 0 3px var(--accent-secondary-glow);
}

/* ── Data management ── */
.data-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 1.5rem;
}

/* ── Principles grid ── */
.principles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 12px;
  margin-top: 1rem;
}

.principle-item {
  padding: 1rem;
  background: var(--bg-elevated);
  border-left: 3px solid var(--accent);
  border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
}

.principle-title {
  font-weight: 600;
  font-size: 0.9rem;
  margin-bottom: 4px;
}

.principle-desc {
  font-size: 0.82rem;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ── Calculators ── */
.calc-hero {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  margin-bottom: 2rem;
}

.calc-input-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 1.5rem;
}

.calc-results-panel {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.calc-form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.calc-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.calc-field.full-width {
  grid-column: 1 / -1;
}

.calc-field label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
}

.calc-input {
  padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xs);
  color: var(--text-primary);
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  transition: var(--transition);
}

.calc-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.calc-select {
  padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xs);
  color: var(--text-primary);
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  transition: var(--transition);
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%238888a0' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  padding-right: 36px;
}

.calc-select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.calc-select option {
  background: var(--bg-card);
  color: var(--text-primary);
}

.calc-btn-row {
  grid-column: 1 / -1;
  display: flex;
  gap: 10px;
  margin-top: 8px;
}

.btn-calculate {
  flex: 1;
  padding: 12px 24px;
  background: linear-gradient(135deg, var(--accent), #ff6b8a);
  color: white;
  border: none;
  border-radius: var(--radius-xs);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 2px;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 0 20px var(--accent-glow);
}

.btn-calculate:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 30px var(--accent-glow);
}

.btn-save-profile {
  padding: 12px 20px;
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);

const FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT_ID.appspot.com",

};

let db = null;
let auth = null;
let currentUser = null;

// ════════════════════════════════════════
// STATE & STORAGE
// ════════════════════════════════════════
const STORAGE_KEY = "iron-protocol-data";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveState(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  if (currentUser && db) {
    pushToCloud(data);
    showToast('☁ Saved & synced');
  } else {
    showToast('💾 Saved locally');
  }
}

let state = loadState();
let currentWeek = state._currentWeek || 1;
let currentPage = "overview";

function showToast(msg) {
  const t = document.getElementById("save-toast");
  t.textContent = msg || '✓ Saved';
  t.classList.add("visible");
  setTimeout(() => t.classList.remove("visible"), 1800);
}

// ════════════════════════════════════════
// FIREBASE AUTH + FIRESTORE
// ════════════════════════════════════════
function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    auth = firebase.auth();

    auth.onAuthStateChanged(async (user) => {
      currentUser = user;
      updateAuthUI();
      if (user) {
        await pullFromCloud();
        render();
      }
    });
  } catch (e) {
    console.warn('Firebase init failed — running in local-only mode.', e);
  }
}

async function pullFromCloud() {
  if (!db || !currentUser) return;
  try {
    const doc = await db.collection('users').doc(currentUser.uid).get();
    if (doc.exists) {
      const cloudData = doc.data();
      state = { ...state, ...cloudData };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      currentWeek = state._currentWeek || 1;
    }
  } catch (e) {
    console.warn('Cloud pull failed:', e);
  }
}

async function pushToCloud(data) {
  if (!db || !currentUser) return;
  try {
    await db.collection('users').doc(currentUser.uid).set(data, { merge: true });
    updateSyncDot(true);
  } catch (e) {
    console.warn('Cloud push failed:', e);
    updateSyncDot(false);
  }
}

function signInWithGoogle() {
  if (!auth) { alert('Firebase not configured yet. See FIREBASE_CONFIG in the source.'); return; }
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

function signOutUser() {
  if (!auth) return;
  auth.signOut();
}

function updateAuthUI() {
  const btn = document.getElementById('auth-btn');
  const indicator = document.getElementById('sync-indicator');
  if (!btn) return;
  if (currentUser) {
    const name = currentUser.displayName ? currentUser.displayName.split(' ')[0] : currentUser.email;
    btn.textContent = `Sign Out (${name})`;
    btn.onclick = signOutUser;
    if (indicator) indicator.style.display = 'flex';
  } else {
    btn.textContent = '☁ Sign In';
    btn.onclick = signInWithGoogle;
    if (indicator) indicator.style.display = 'none';
  }
}

function updateSyncDot(ok) {
  const dot = document.getElementById('sync-dot');
  if (dot) dot.style.background = ok ? '#22c55e' : '#ef4444';
}

function getLogKey(workout, weekNum, exerciseIdx, field) {
  return `log_${workout}_w${weekNum}_e${exerciseIdx}_${field}`;
}

function getProgressKey(weekNum, metric) {
  return `prog_w${weekNum}_${metric.replace(/[^a-zA-Z0-9]/g, '_')}`;
}

  else if (currentPage === "calculators") main.innerHTML = renderCalculators();
  else main.innerHTML = renderWorkout(currentPage);

  attachListeners();
}

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setWeek(n) {
  currentWeek = n;
  state._currentWeek = n;
  saveState(state);
  render();
}

function saveInput(el) {
  const key = el.dataset.key;
  state[key] = el.value;
  saveState(state);
}

function attachListeners() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.onclick = () => navigateTo(btn.dataset.page);
  });
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `iron-protocol-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      state = { ...state, ...imported };
      saveState(state);
      render();
      alert('Data imported successfully!');
    } catch {
      alert('Invalid file. Please use a valid JSON backup.');
    }
  };
  reader.readAsText(file);
}

function getCalcInputVal(id) {

}

function runCalculations() {
  const age = getCalcInputVal('calc-age');
  const sex = document.getElementById('calc-sex')?.value || 'male';
  const heightCm = getCalcInputVal('calc-height');
  const weightKg = getCalcInputVal('calc-weight');
  const activityLevel = document.getElementById('calc-activity')?.value || '1.55';
  const goal = document.getElementById('calc-goal')?.value || 'maintain';
  const waistCm = getCalcInputVal('calc-waist');
  const neckCm = getCalcInputVal('calc-neck');
  const hipCm = getCalcInputVal('calc-hip');
  const ethnicity = document.getElementById('calc-ethnicity')?.value || 'caucasian';

  if (!age || !heightCm || !weightKg) {
    alert('Please enter at least your age, height, and weight.');
    return;
  }

  const actMult = parseFloat(activityLevel);

  // ── BMR: Mifflin-St Jeor (most validated) ──
  let bmr;
  if (sex === 'male') {
    bmr = (10 * weightKg) + (6.25 * heightCm) - (5 * age) + 5;
  } else {
    bmr = (10 * weightKg) + (6.25 * heightCm) - (5 * age) - 161;
  }

  // ── BMR: Katch-McArdle (if we have body fat) ──
  let bmrKatch = null;

  // ── TDEE ──
  const tdee = bmr * actMult;

  // ── BMI ──
  const heightM = heightCm / 100;
  const bmi = weightKg / (heightM * heightM);

  // ── BMI Category ──
  let bmiCategory, bmiColor;
  if (bmi < 18.5) { bmiCategory = 'Underweight'; bmiColor = '#3b82f6'; }
  else if (bmi < 25) { bmiCategory = 'Normal'; bmiColor = '#22c55e'; }
  else if (bmi < 30) { bmiCategory = 'Overweight'; bmiColor = '#f59e0b'; }
  else { bmiCategory = 'Obese'; bmiColor = '#ef4444'; }

  // ── Body Fat % ── US Navy Method (most accessible tape-measure formula)
  let bodyFatPct = null;
  let bodyFatMethod = '';
  if (waistCm && neckCm && heightCm) {
    if (sex === 'male') {
      // US Navy: 86.010 × log10(waist − neck) − 70.041 × log10(height) + 36.76
      if (waistCm > neckCm) {
        bodyFatPct = 86.010 * Math.log10(waistCm - neckCm) - 70.041 * Math.log10(heightCm) + 36.76;
        bodyFatMethod = 'US Navy';
      }
    } else {
      // Female: 163.205 × log10(waist + hip − neck) − 97.684 × log10(height) − 78.387
      if (hipCm && (waistCm + hipCm) > neckCm) {
        bodyFatPct = 163.205 * Math.log10(waistCm + hipCm - neckCm) - 97.684 * Math.log10(heightCm) - 78.387;
        bodyFatMethod = 'US Navy';
      }
    }
  }

  // ── CUN-BAE body fat estimate (uses BMI, age, sex) ──
  // CUN-BAE: −44.988 + (0.503 × age) + (10.689 × sex[m=0,f=1]) + (3.172 × BMI)
  //          − (0.026 × BMI²) + (0.181 × BMI × sex) − (0.02 × BMI × age)
  //          − (0.005 × BMI² × sex) + (0.00021 × BMI² × age)
  const sexVal = sex === 'female' ? 1 : 0;
  const cunBae = -44.988 + (0.503 * age) + (10.689 * sexVal) + (3.172 * bmi)
    - (0.026 * bmi * bmi) + (0.181 * bmi * sexVal) - (0.02 * bmi * age)
    - (0.005 * bmi * bmi * sexVal) + (0.00021 * bmi * bmi * age);

  if (!bodyFatPct) {
    bodyFatPct = cunBae;
    bodyFatMethod = 'CUN-BAE';
  }

  // ── Ethnicity-adjusted body fat (Deurenberg adaptation) ──
  // Certain populations have different body fat at same BMI
  // Asian populations: ~3-5% higher BF at same BMI
  // African descent: ~1-3% lower BF at same BMI
  let ethnicAdj = 0;
  let ethnicNote = '';
  if (ethnicity === 'south_asian' || ethnicity === 'east_asian') {
    ethnicAdj = 3.5;
    ethnicNote = 'Adjusted +3.5% for South/East Asian populations (higher adiposity at equivalent BMI per WHO evidence)';
  } else if (ethnicity === 'african') {
    ethnicAdj = -2.0;
    ethnicNote = 'Adjusted −2% for African descent populations (higher lean mass at equivalent BMI per published data)';
  } else if (ethnicity === 'hispanic') {
    ethnicAdj = 1.5;
    ethnicNote = 'Adjusted +1.5% for Hispanic populations (moderate adiposity difference at equivalent BMI)';
  }

  const bodyFatAdj = Math.max(3, bodyFatPct + ethnicAdj);

  // Katch-McArdle with body fat
  if (bodyFatAdj) {
    const lbm = weightKg * (1 - bodyFatAdj / 100);
    bmrKatch = 370 + (21.6 * lbm);
  }

  // ── Lean Body Mass & Fat Mass ──
  const fatMass = weightKg * (bodyFatAdj / 100);
  const leanMass = weightKg - fatMass;

  // ── FFMI (Fat-Free Mass Index) ──
  // FFMI = LBM / height² + 6.1 × (1.8 − height)
  const ffmi = (leanMass / (heightM * heightM)) + 6.1 * (1.8 - heightM);

  let ffmiCategory;
  if (sex === 'male') {
    if (ffmi < 18) ffmiCategory = 'Below average';
    else if (ffmi < 20) ffmiCategory = 'Average';
    else if (ffmi < 22) ffmiCategory = 'Above average';
    else if (ffmi < 25) ffmiCategory = 'Excellent / Advanced';
    else ffmiCategory = 'Near genetic limit';
  } else {
    if (ffmi < 14) ffmiCategory = 'Below average';
    else if (ffmi < 16.5) ffmiCategory = 'Average';
    else if (ffmi < 18) ffmiCategory = 'Above average';
    else if (ffmi < 21) ffmiCategory = 'Excellent / Advanced';
    else ffmiCategory = 'Near genetic limit';
  }

  // ── Waist-to-Height Ratio ──
  let wthr = null, wthrRisk = '';
  if (waistCm) {
    wthr = waistCm / heightCm;
    if (wthr < 0.4) wthrRisk = 'Underweight risk';
    else if (wthr < 0.5) wthrRisk = 'Healthy';
    else if (wthr < 0.6) wthrRisk = 'Elevated risk';
    else wthrRisk = 'High risk';
  }

  // ── Ideal Body Weight (Devine formula) ──
  let ibw;
  const heightIn = heightCm / 2.54;
  if (sex === 'male') {
    ibw = 50 + 2.3 * (heightIn - 60);
  } else {
    ibw = 45.5 + 2.3 * (heightIn - 60);
  }
  if (ibw < 0) ibw = weightKg; // fallback for very short people

  // ── Caloric targets by goal ──
  let targetCals, goalLabel;
  switch (goal) {
    case 'cut_aggressive': targetCals = tdee - 750; goalLabel = 'Aggressive Cut (−750 kcal)'; break;
    case 'cut': targetCals = tdee - 500; goalLabel = 'Moderate Cut (−500 kcal)'; break;
    case 'cut_mild': targetCals = tdee - 250; goalLabel = 'Mild Cut (−250 kcal)'; break;
    case 'maintain': targetCals = tdee; goalLabel = 'Maintenance'; break;
    case 'lean_bulk': targetCals = tdee + 250; goalLabel = 'Lean Bulk (+250 kcal)'; break;
    case 'bulk': targetCals = tdee + 500; goalLabel = 'Bulk (+500 kcal)'; break;
    default: targetCals = tdee; goalLabel = 'Maintenance';
  }

  // ── Macros (standard hypertrophy split) ──
  // Protein: 2g/kg lean mass (or 1.8g/kg total if no BF data)
  // Fat: 25% of calories
  // Carbs: remainder
  const proteinG = bodyFatAdj ? Math.round(leanMass * 2.2) : Math.round(weightKg * 1.8);
  const fatCals = targetCals * 0.25;
  const fatG = Math.round(fatCals / 9);
  const proteinCals = proteinG * 4;
  const carbCals = targetCals - proteinCals - fatCals;
  const carbG = Math.round(Math.max(0, carbCals / 4));

  // ── Water intake (based on weight and activity) ──
  const waterL = ((weightKg * 0.033) * actMult / 1.55).toFixed(1);

  // ── Max Heart Rate (Tanaka formula - more accurate than 220−age) ──
  const mhr = Math.round(208 - (0.7 * age));

  // ── Heart rate zones ──
  const hrZones = [
    { zone: 'Zone 1 — Recovery', range: `${Math.round(mhr*0.5)}–${Math.round(mhr*0.6)} bpm`, pct: '50-60%' },
    { zone: 'Zone 2 — Fat Burn', range: `${Math.round(mhr*0.6)}–${Math.round(mhr*0.7)} bpm`, pct: '60-70%' },
    { zone: 'Zone 3 — Aerobic', range: `${Math.round(mhr*0.7)}–${Math.round(mhr*0.8)} bpm`, pct: '70-80%' },
    { zone: 'Zone 4 — Threshold', range: `${Math.round(mhr*0.8)}–${Math.round(mhr*0.9)} bpm`, pct: '80-90%' },
    { zone: 'Zone 5 — Max Effort', range: `${Math.round(mhr*0.9)}–${mhr} bpm`, pct: '90-100%' },
  ];

  // ── Render results ──
  const resultsPanel = document.getElementById('calc-results');
  if (!resultsPanel) return;

  // Body fat gauge
  const bfPct = bodyFatAdj ? Math.min(bodyFatAdj, 50) : 0;
  const bfStroke = (bfPct / 50) * 251; // circumference ~251 for r=40
  let bfColor = '#22c55e';
  if (sex === 'male') {
    if (bfPct > 25) bfColor = '#ef4444';
    else if (bfPct > 20) bfColor = '#f59e0b';
    else if (bfPct > 14) bfColor = '#22c55e';
    else bfColor = '#3b82f6';
  } else {
    if (bfPct > 32) bfColor = '#ef4444';
    else if (bfPct > 25) bfColor = '#f59e0b';
    else if (bfPct > 20) bfColor = '#22c55e';
    else bfColor = '#3b82f6';
  }

  // Macro percentages for bar
  const totalMacroCals = (proteinG * 4) + (carbG * 4) + (fatG * 9);
  const protPct = ((proteinG * 4) / totalMacroCals * 100).toFixed(0);
  const carbPct = ((carbG * 4) / totalMacroCals * 100).toFixed(0);
  const fatPctMacro = ((fatG * 9) / totalMacroCals * 100).toFixed(0);

  resultsPanel.innerHTML = `
    <!-- BMR & TDEE -->
    <div class="result-card">
      <div class="result-icon fire">🔥</div>
      <div class="result-info">
        <div class="result-label">BMR (Mifflin-St Jeor)</div>
        <div class="result-value">${Math.round(bmr)} <span style="font-size:0.9rem;color:var(--text-secondary)">kcal/day</span></div>
        <div class="result-sub">Calories your body burns at complete rest</div>
      </div>
    </div>

    ${bmrKatch ? `
    <div class="result-card">
      <div class="result-icon fire">⚡</div>
      <div class="result-info">
        <div class="result-label">BMR (Katch-McArdle)</div>
        <div class="result-value">${Math.round(bmrKatch)} <span style="font-size:0.9rem;color:var(--text-secondary)">kcal/day</span></div>
        <div class="result-sub">Lean-mass adjusted — more accurate if body fat is known</div>
      </div>
    </div>
    ` : ''}

    <div class="result-card">
      <div class="result-icon bolt">⚡</div>
      <div class="result-info">
        <div class="result-label">TDEE (Total Daily Energy Expenditure)</div>
        <div class="result-value">${Math.round(tdee)} <span style="font-size:0.9rem;color:var(--text-secondary)">kcal/day</span></div>
        <div class="result-sub">BMR × ${actMult} activity multiplier</div>
        <div class="tdee-bar-container">
          <div class="tdee-bar">
            <div class="tdee-bar-segment" style="width:${((bmr/tdee)*100).toFixed(0)}%;background:var(--accent)"></div>
            <div class="tdee-bar-segment" style="width:${(((tdee-bmr)/tdee)*100).toFixed(0)}%;background:var(--accent-secondary)"></div>
          </div>
          <div class="tdee-legend">
            <div class="tdee-legend-item"><div class="tdee-legend-dot" style="background:var(--accent)"></div>BMR (${Math.round(bmr)})</div>
            <div class="tdee-legend-item"><div class="tdee-legend-dot" style="background:var(--accent-secondary)"></div>Activity (${Math.round(tdee - bmr)})</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Target calories -->
    <div class="result-card" style="border-color:var(--accent)">
      <div class="result-icon target">🎯</div>
      <div class="result-info">
        <div class="result-label">Daily Calorie Target — ${goalLabel}</div>
        <div class="result-value" style="color:var(--accent)">${Math.round(targetCals)} <span style="font-size:0.9rem">kcal/day</span></div>
        <div class="result-sub">${Math.round(targetCals * 7)} kcal/week</div>
      </div>
    </div>

    <!-- Macros -->
    <div class="card" style="margin:0">
      <div class="card-header">
        <div class="card-title">🍽 Recommended Macros</div>
      </div>
      <div class="macro-grid">
        <div class="macro-card">
          <div class="macro-name">Protein</div>
          <div class="macro-value" style="color:#ef4444">${proteinG}<span class="macro-unit">g</span></div>
          <div style="font-size:0.75rem;color:var(--text-secondary)">${protPct}% · ${proteinG * 4} kcal</div>
          <div class="macro-bar"><div class="macro-bar-fill" style="width:${protPct}%;background:#ef4444"></div></div>
        </div>
        <div class="macro-card">
          <div class="macro-name">Carbs</div>
          <div class="macro-value" style="color:#f59e0b">${carbG}<span class="macro-unit">g</span></div>
          <div style="font-size:0.75rem;color:var(--text-secondary)">${carbPct}% · ${carbG * 4} kcal</div>
          <div class="macro-bar"><div class="macro-bar-fill" style="width:${carbPct}%;background:#f59e0b"></div></div>
        </div>
        <div class="macro-card">
          <div class="macro-name">Fat</div>
          <div class="macro-value" style="color:#3b82f6">${fatG}<span class="macro-unit">g</span></div>
          <div style="font-size:0.75rem;color:var(--text-secondary)">${fatPctMacro}% · ${fatG * 9} kcal</div>
          <div class="macro-bar"><div class="macro-bar-fill" style="width:${fatPctMacro}%;background:#3b82f6"></div></div>
        </div>
      </div>
      <div style="font-size:0.75rem;color:var(--text-muted);margin-top:10px">
        Protein @ ~2.2g/kg lean mass for hypertrophy · Fat @ 25% total cals · Carbs fill the rest
      </div>
    </div>

    <!-- Body Composition -->
    <div class="bodycomp-row">
      <div class="gauge-ring">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="40" fill="none" stroke="var(--bg-input)" stroke-width="8"/>
          <circle cx="50" cy="50" r="40" fill="none" stroke="${bfColor}" stroke-width="8"
            stroke-dasharray="${bfStroke} ${251 - bfStroke}" stroke-linecap="round"/>
        </svg>
        <div class="gauge-ring-text">
          ${bodyFatAdj ? bodyFatAdj.toFixed(1) + '%' : '—'}
          <span class="gauge-ring-sub">BODY FAT</span>
        </div>
      </div>
      <div class="bodycomp-details">
        <div class="bodycomp-stat">
          <div class="bodycomp-stat-label">Method</div>
          <div class="bodycomp-stat-value" style="font-size:0.85rem">${bodyFatMethod}${ethnicAdj ? ' + Ethnic Adj.' : ''}</div>
        </div>
        <div class="bodycomp-stat">
          <div class="bodycomp-stat-label">Lean Mass</div>
          <div class="bodycomp-stat-value">${leanMass.toFixed(1)} kg</div>
        </div>
        <div class="bodycomp-stat">
          <div class="bodycomp-stat-label">Fat Mass</div>
          <div class="bodycomp-stat-value">${fatMass.toFixed(1)} kg</div>
        </div>
        <div class="bodycomp-stat">
          <div class="bodycomp-stat-label">FFMI</div>
          <div class="bodycomp-stat-value">${ffmi.toFixed(1)} <span style="font-size:0.75rem;color:var(--text-secondary)">— ${ffmiCategory}</span></div>
        </div>
      </div>
    </div>
    ${ethnicNote ? `<div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;padding:0 4px">ℹ ${ethnicNote}</div>` : ''}

    <!-- Other metrics row -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="result-card">
        <div class="result-icon scale">⚖</div>
        <div class="result-info">
          <div class="result-label">BMI</div>
          <div class="result-value" style="color:${bmiColor}">${bmi.toFixed(1)}</div>
          <div class="result-sub">${bmiCategory} · Ideal weight: ${ibw.toFixed(1)} kg (Devine)</div>
        </div>
      </div>
      ${wthr !== null ? `
      <div class="result-card">
        <div class="result-icon drop">📐</div>
        <div class="result-info">
          <div class="result-label">Waist-to-Height Ratio</div>
          <div class="result-value">${wthr.toFixed(3)}</div>
          <div class="result-sub">${wthrRisk} · Target: &lt; 0.50</div>
        </div>
      </div>
      ` : `
      <div class="result-card">
        <div class="result-icon drop">💧</div>
        <div class="result-info">
          <div class="result-label">Daily Water Intake</div>
          <div class="result-value">${waterL} <span style="font-size:0.9rem;color:var(--text-secondary)">litres</span></div>
          <div class="result-sub">Based on weight & activity level</div>
        </div>
      </div>
      `}
    </div>

    ${wthr !== null ? `
    <div class="result-card">
      <div class="result-icon drop">💧</div>
      <div class="result-info">
        <div class="result-label">Daily Water Intake</div>
        <div class="result-value">${waterL} <span style="font-size:0.9rem;color:var(--text-secondary)">litres</span></div>
        <div class="result-sub">Based on weight & activity level</div>
      </div>
    </div>
    ` : ''}

    <!-- Heart Rate -->
    <div class="card" style="margin:0">
      <div class="card-header">
        <div class="card-title">❤ Heart Rate Zones</div>
        <span class="load-tag">Max HR: ${mhr} bpm (Tanaka)</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${hrZones.map((z, i) => {
          const colors = ['#3b82f6','#22c55e','#f59e0b','#f97316','#ef4444'];
          return `
            <div style="display:flex;align-items:center;gap:12px;padding:8px 12px;background:var(--bg-elevated);border-radius:var(--radius-xs)">
              <div style="width:10px;height:10px;border-radius:50%;background:${colors[i]};flex-shrink:0"></div>
              <div style="flex:1;font-size:0.85rem;font-weight:500">${z.zone}</div>
              <div style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--text-secondary)">${z.range}</div>
              <span class="load-tag">${z.pct}</span>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;

  // Save profile
  saveCalcProfile({
    age, sex, heightCm, weightKg, activityLevel, goal, waistCm, neckCm, hipCm, ethnicity
  });
}

function renderCalculators() {
  const p = getCalcProfile();

  return `
    <div class="page active">
      <div class="page-title">Fitness Calculators</div>
      <div class="page-subtitle">BMR · TDEE · Body Fat · BMI · FFMI · Macros · Heart Rate Zones — all evidence-based formulas</div>

      <div class="calc-hero">
        <!-- Input Panel -->
        <div class="calc-input-panel">
          <div class="section-label">📋 Your Profile</div>
          <div class="calc-form-grid">
            <div class="calc-field">
              <label>Age</label>
              <input class="calc-input" type="number" id="calc-age" placeholder="e.g. 28" min="14" max="100" value="${p.age || ''}">
            </div>
            <div class="calc-field">
              <label>Biological Sex</label>
              <select class="calc-select" id="calc-sex">
                <option value="male" ${p.sex === 'male' || !p.sex ? 'selected' : ''}>Male</option>
                <option value="female" ${p.sex === 'female' ? 'selected' : ''}>Female</option>
              </select>
            </div>
            <div class="calc-field">
              <label>Height (cm)</label>
              <input class="calc-input" type="number" id="calc-height" placeholder="e.g. 178" min="100" max="250" value="${p.heightCm || ''}">
            </div>
            <div class="calc-field">
              <label>Weight (kg)</label>
              <input class="calc-input" type="number" id="calc-weight" placeholder="e.g. 82" min="30" max="300" step="0.1" value="${p.weightKg || ''}">
            </div>
            <div class="calc-field">
              <label>Ethnicity (for BF% adjustment)</label>
              <select class="calc-select" id="calc-ethnicity">
                <option value="caucasian" ${p.ethnicity === 'caucasian' || !p.ethnicity ? 'selected' : ''}>Caucasian / European</option>
                <option value="african" ${p.ethnicity === 'african' ? 'selected' : ''}>African / Afro-Caribbean</option>
                <option value="south_asian" ${p.ethnicity === 'south_asian' ? 'selected' : ''}>South Asian</option>
                <option value="east_asian" ${p.ethnicity === 'east_asian' ? 'selected' : ''}>East Asian / SE Asian</option>
                <option value="hispanic" ${p.ethnicity === 'hispanic' ? 'selected' : ''}>Hispanic / Latino</option>
                <option value="other" ${p.ethnicity === 'other' ? 'selected' : ''}>Other / Prefer not to say</option>
              </select>
            </div>
            <div class="calc-field">
              <label>Activity Level</label>
              <select class="calc-select" id="calc-activity">
                <option value="1.2" ${p.activityLevel === '1.2' ? 'selected' : ''}>Sedentary (desk job, no exercise)</option>
                <option value="1.375" ${p.activityLevel === '1.375' ? 'selected' : ''}>Lightly Active (1-2 days/wk)</option>
                <option value="1.55" ${p.activityLevel === '1.55' || !p.activityLevel ? 'selected' : ''}>Moderately Active (3-4 days/wk)</option>
                <option value="1.725" ${p.activityLevel === '1.725' ? 'selected' : ''}>Very Active (5-6 days/wk)</option>
                <option value="1.9" ${p.activityLevel === '1.9' ? 'selected' : ''}>Extremely Active (2x/day, physical job)</option>
              </select>
            </div>
            <div class="calc-field full-width">
              <label>Goal</label>
              <select class="calc-select" id="calc-goal">
                <option value="cut_aggressive" ${p.goal === 'cut_aggressive' ? 'selected' : ''}>Aggressive Cut (−750 kcal) — ~0.7 kg/wk loss</option>
                <option value="cut" ${p.goal === 'cut' ? 'selected' : ''}>Moderate Cut (−500 kcal) — ~0.5 kg/wk loss</option>
                <option value="cut_mild" ${p.goal === 'cut_mild' ? 'selected' : ''}>Mild Cut (−250 kcal) — ~0.25 kg/wk loss</option>
                <option value="maintain" ${p.goal === 'maintain' || !p.goal ? 'selected' : ''}>Maintenance</option>
                <option value="lean_bulk" ${p.goal === 'lean_bulk' ? 'selected' : ''}>Lean Bulk (+250 kcal) — ~0.25 kg/wk gain</option>
                <option value="bulk" ${p.goal === 'bulk' ? 'selected' : ''}>Bulk (+500 kcal) — ~0.5 kg/wk gain</option>
              </select>
            </div>

            <div class="calc-field full-width" style="margin-top:8px">
              <div class="section-label" style="margin-bottom:0">📏 Optional — Tape Measurements (for body fat)</div>
            </div>
            <div class="calc-field">
              <label>Waist at navel (cm)</label>
              <input class="calc-input" type="number" id="calc-waist" placeholder="e.g. 84" step="0.1" value="${p.waistCm || ''}">
            </div>
            <div class="calc-field">
              <label>Neck circumference (cm)</label>
              <input class="calc-input" type="number" id="calc-neck" placeholder="e.g. 38" step="0.1" value="${p.neckCm || ''}">
            </div>
            <div class="calc-field" id="hip-field" style="${(!p.sex || p.sex === 'male') ? 'opacity:0.4' : ''}">
              <label>Hip circumference (cm) — females</label>
              <input class="calc-input" type="number" id="calc-hip" placeholder="e.g. 98" step="0.1" value="${p.hipCm || ''}">
            </div>

            <div class="calc-btn-row">
              <button class="btn-calculate" onclick="runCalculations()">CALCULATE ALL</button>
              <button class="btn-save-profile" onclick="runCalculations()">💾 Save Profile</button>
            </div>
          </div>
        </div>

        <!-- Results Panel -->
        <div class="calc-results-panel" id="calc-results">
          <div class="result-card" style="flex-direction:column;align-items:center;text-align:center;padding:3rem 2rem">
            <div style="font-size:48px;margin-bottom:12px">🧮</div>
            <div style="font-size:1.1rem;font-weight:600;margin-bottom:4px">Enter your details & hit Calculate</div>
            <div style="font-size:0.85rem;color:var(--text-secondary)">
              We'll compute BMR, TDEE, body fat %, BMI, FFMI, macros, ideal weight, water intake, heart rate zones and more.
            </div>
          </div>
        </div>
      </div>

      <!-- Formula reference -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">📚 Formula Reference</div>
        </div>
        <div class="formula-grid">
          <div class="formula-card">
            <div class="formula-name">Mifflin-St Jeor BMR <span class="formula-tag">GOLD STANDARD</span></div>
            <div class="formula-desc">Most validated BMR equation for general populations. Recommended by the Academy of Nutrition and Dietetics.</div>
            <div class="formula-eq">Male: 10×W + 6.25×H − 5×A + 5<br>Female: 10×W + 6.25×H − 5×A − 161<br><em>W=kg, H=cm, A=years</em></div>
          </div>
          <div class="formula-card">
            <div class="formula-name">Katch-McArdle BMR <span class="formula-tag">LEAN MASS</span></div>
            <div class="formula-desc">Uses lean body mass — more accurate for athletic or lean individuals who know their body fat %.</div>
            <div class="formula-eq">BMR = 370 + 21.6 × LBM (kg)<br><em>LBM = Weight × (1 − BF%/100)</em></div>
          </div>
          <div class="formula-card">
            <div class="formula-name">US Navy Body Fat % <span class="formula-tag">TAPE METHOD</span></div>
            <div class="formula-desc">Uses tape measurements of waist, neck (and hip for females). Within ±3-4% of DEXA for most people.</div>
            <div class="formula-eq">Male: 86.010×log₁₀(waist−neck) − 70.041×log₁₀(height) + 36.76<br>Female: 163.205×log₁₀(waist+hip−neck) − 97.684×log₁₀(height) − 78.387</div>
          </div>
          <div class="formula-card">
            <div class="formula-name">CUN-BAE Body Fat % <span class="formula-tag">BMI-BASED</span></div>
            <div class="formula-desc">Estimates body fat from BMI, age, and sex. Used when tape measurements are unavailable. Validated in multiple populations.</div>
            <div class="formula-eq">−44.988 + 0.503×age + 10.689×sex + 3.172×BMI − 0.026×BMI² + 0.181×BMI×sex − 0.02×BMI×age − 0.005×BMI²×sex + 0.00021×BMI²×age<br><em>sex: male=0, female=1</em></div>
          </div>
          <div class="formula-card">
            <div class="formula-name">FFMI (Fat-Free Mass Index) <span class="formula-tag">MUSCLE INDEX</span></div>
            <div class="formula-desc">Height-normalised lean mass index. More useful than BMI for trained individuals. Natural limit is ~25 for men.</div>
            <div class="formula-eq">FFMI = LBM/height² + 6.1 × (1.8 − height)<br><em>LBM in kg, height in metres</em></div>
          </div>
          <div class="formula-card">
            <div class="formula-name">Tanaka Max Heart Rate <span class="formula-tag">CARDIO</span></div>
            <div class="formula-desc">More accurate than the classic 220−age formula. Based on meta-analysis of 351 studies.</div>
            <div class="formula-eq">MHR = 208 − 0.7 × age</div>
          </div>
          <div class="formula-card">
            <div class="formula-name">Devine Ideal Body Weight <span class="formula-tag">CLINICAL</span></div>
            <div class="formula-desc">Originally developed for drug dosing, widely used as a general reference for frame-appropriate weight.</div>
            <div class="formula-eq">Male: 50 + 2.3 × (height_in − 60)<br>Female: 45.5 + 2.3 × (height_in − 60)</div>
          </div>
          <div class="formula-card">
            <div class="formula-name">Ethnicity Adjustments <span class="formula-tag">WHO EVIDENCE</span></div>
            <div class="formula-desc">WHO and published research show body fat varies by ethnicity at the same BMI. We apply Deurenberg-style offsets.</div>
            <div class="formula-eq">South/East Asian: +3.5% BF<br>Hispanic: +1.5% BF<br>African descent: −2% BF<br>Caucasian/Other: baseline</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ── Init ──
render();
attachListeners();
initFirebase();

// Auto-show/hide hip field based on sex
document.addEventListener('change', function(e) {
  if (e.target.id === 'calc-sex') {
    const hipField = document.getElementById('hip-field');
    if (hipField) {
      hipField.style.opacity = e.target.value === 'female' ? '1' : '0.4';
    }
  }
});

// Auto-run calculations if profile is saved
if (state._calcProfile && state._calcProfile.age) {
  // Will run when user navigates to calculators
}
</script>
</body>
</html>
