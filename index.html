<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iron Protocol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <!-- Darebee data — must load before app.js as a global -->
  <script src="darebee-data.js"></script>
  <!-- Exercise library (free-exercise-db + wger, auto-generated) -->
  <script src="exercise-library.js"></script>
  <!-- Community workout library (50 timed/tabata workouts) -->
  <script src="community-workouts-data.js"></script>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-inner">
      <div class="logo" onclick="navigateTo('today')" style="cursor:pointer">
        <div class="logo-icon">🏋</div>
        <div class="logo-text">IRON PROTOCOL</div>
      </div>
      <nav class="nav" id="main-nav">
        <button class="nav-btn active" data-tab="today">Today</button>
        <button class="nav-btn" data-tab="train">Train</button>
        <button class="nav-btn" data-tab="build">Build</button>
        <button class="nav-btn" data-tab="me">Me</button>
        <button class="nav-btn" data-tab="calc">Calc</button>
      </nav>
      <div id="auth-status" style="display:flex;align-items:center;gap:10px;flex-shrink:0">
        <div id="sync-indicator" style="display:none;align-items:center;gap:5px;font-size:.75rem;color:var(--text-secondary)">
          <div id="sync-dot" style="width:8px;height:8px;border-radius:50%;background:#22c55e"></div>
          Cloud
        </div>
        <button id="auth-btn" class="btn btn-ghost" style="font-size:.78rem;padding:5px 12px">☁ Sign In</button>
      </div>
    </div>
  </header>
  <main class="main" id="main-content"></main>
  <div class="save-toast" id="save-toast"></div>
</div>
<nav class="bottom-nav" id="bottom-nav">
  <button class="nav-btn bottom-nav-btn active" data-tab="today">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Today</span>
  </button>
  <button class="nav-btn bottom-nav-btn" data-tab="train">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>Train</span>
  </button>
  <button class="nav-btn bottom-nav-btn" data-tab="build">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span>Build</span>
  </button>
  <button class="nav-btn bottom-nav-btn" data-tab="me">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Me</span>
  </button>
  <button class="nav-btn bottom-nav-btn" data-tab="calc">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>
    <span>Calc</span>
  </button>
</nav>
<script type="module" src="js/app.js"></script>
</body>
</html>
